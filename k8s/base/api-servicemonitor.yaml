apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: api-metrics
  labels:
    release: prometheus
spec:
  jobLabel: app  # uses the Service's 'app' label value as the job name
  selector:
    matchLabels:
      app: api
  endpoints:
  - port: "8080"
    path: /metrics
    interval: 15s
